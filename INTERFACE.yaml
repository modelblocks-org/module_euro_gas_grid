# Module Input-Output structure for automated doc. generation
resources:
  user:
    "{shapes}/shapes.parquet": |
      Region geometries in parquet format.
      These should conform to the schema defined in https://github.com/calliope-project/module_geo_boundaries/.
results:
  "{shapes}/hubs.parquet": geoparquet describing hub node details and thresholds (Points).
  "{shapes}/nodes.parquet": geoparquet describing aggregated nodes (Points).
  "{shapes}/pipelines.parquet": geoparquet describing aggregated pipelines capacity (LineStrings).
  "{shapes}/salt_cavern_h2_potential.parquet": parquet file describing aggregated salt cavern storage capacity.

wildcards:
  shapes: name of the provided shapefile case.
