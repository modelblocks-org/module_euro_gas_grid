# Emulate how another project would configure this module
module_euro_gas_grid:
  crs:
    projected: "EPSG:3857"

  clustering:
    pipelines:
      replace_sovereign:
        NL1: NLD
        FI1: FIN
        GB1: GBR
        DN1: DNK
    salt_caverns:
      min_gwh: 0.01  # values below this will be turned to zero

  imputation:
    inferred_mm: 500
    recalculate_below_mw: 500
    capacity_correction_threshold: 6
    # Destroyed underwater pipelines.
    # https://en.wikipedia.org/wiki/Nord_Stream_pipelines_sabotage
    excluded_pipeline_ids: [6055, 6364]
    bidirectional_below_distance: 10000  # 10km (matches projected CRS unit)
