[workspace]
name = "module_euro_gas_grid"
authors = ["See AUTHORS file"]
description = "A module to disaggregate gas networks for European countries."
license = "Apache-2.0"
readme = "README.md"
channels = ["conda-forge", "bioconda"]
platforms = ["win-64", "linux-64", "osx-arm64"]
homepage = "https://clio.readthedocs.io/"

[dependencies]
clio-tools = ">=2025.03.03"
conda = ">=25.0.0"
ipdb = ">=0.13.13"
ipykernel = ">=6.29.5"
jsonschema = ">=4.0.0"
mypy = ">=1.15.0"
pytest = ">=8.3.5"
python = ">=3.12"
ruff = ">=0.9.9"
snakefmt = ">=0.10.2"
snakemake-minimal = ">=8.29.0"
geopandas = ">=1.1.1,<2"
pyarrow = ">=22.0.0,<23"
country_converter = ">=1.3.2,<2"
pandera-geopandas = ">=0.24.0,<0.25"
pycountry = ">=24.6.1,<25"
matplotlib = ">=3.10.8,<4"
cmap = ">=0.6.2,<0.7"
networkx = ">=3.6,<4"
scipy = ">=1.16.3,<2"

[tasks]
test-integration = {cmd = "pytest tests/clio_test.py"}
