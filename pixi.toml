[workspace]
name = "module_euro_gas_grid"
authors = ["See AUTHORS file"]
description = "A module to cluster European gas networks into any resolution."
license = "Apache-2.0"
readme = "README.md"
channels = ["conda-forge", "bioconda"]
platforms = ["win-64", "linux-64", "osx-arm64"]
homepage = "https://www.modelblocks.org/"

[dependencies]
clio-tools = ">=2026.03.30"
conda = ">=25.0.0"
ipdb = ">=0.13.13"
ipykernel = ">=6.29.5"
jsonschema = ">=4.0.0"
mypy = ">=1.15.0"
pytest = ">=8.3.5"
python = ">=3.12"
ruff = ">=0.9.9"
snakefmt = ">=0.10.2"
snakemake-minimal = ">=8.29.0"
pytz = ">=2026.1.post1"

[tasks]
test-integration = {cmd = "pytest tests/integration_test.py"}

[feature.euro-gas-grid]
channels = ["conda-forge", "nodefaults"]

[feature.euro-gas-grid.dependencies]
cmap = "0.6.2.*"
country_converter = "1.3.2.*"
geopandas = "1.0.1.*"
matplotlib = "3.10.8.*"
numpy = "2.3.4.*"
pandas = "2.3.3.*"
pandera-geopandas = "0.24.*"
pandera-io = "0.24.*"
pyarrow = "19.0.1.*"
python = "3.13.9.*"
scipy = "1.16.3.*"
shapely = "2.1.2.*"

[environments]
euro-gas-grid = { features = ["euro-gas-grid"], no-default-feature = true }
